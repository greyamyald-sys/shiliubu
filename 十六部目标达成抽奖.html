<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>十六部 - 战神作战指挥中心</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #3b82f6; --bg: #f8fafc; --text: #1e293b; --green: #10b981; --red: #ef4444; --gold: #fbbf24; --purp: #a855f7; }
        body { background: var(--bg); font-family: sans-serif; margin: 0; min-height: 100vh; color: var(--text); overflow-x: hidden; }
        .card { background: #fff; padding: 18px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        #notice-bar { position: fixed; top: 0; width: 100%; background: var(--red); color: #fff; padding: 6px 0; font-weight: bold; z-index: 999; overflow: hidden; height: 30px; }
        .marquee { display: inline-block; white-space: nowrap; animation: marquee 30s linear infinite; line-height: 30px; padding-left: 100%; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-150%); } }

        #force-overlay, #pk-invite-overlay { display: none; position: fixed; inset: 0; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #fff; background: rgba(16, 185, 129, 0.98); }
        #pk-invite-overlay { background: rgba(30, 41, 59, 0.98); border: 8px solid var(--gold); }
        #cheer-layer { position: fixed; inset: 0; pointer-events: none; z-index: 10000; }
        .emoji-fly { position: absolute; bottom: 0; animation: flyUp 2s forwards; font-size: 40px; }

        #app { display: none; width: 1280px; margin: 40px auto 0; padding: 20px; flex-direction: column; gap: 20px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1.5fr 260px; gap: 20px; }
        .prog-box { height: 12px; background: #f1f5f9; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        .bar { height: 100%; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }
        
        .layout { display: grid; grid-template-columns: 1fr 320px 320px; gap: 20px; }
        canvas { transition: transform 6s cubic-bezier(0.15, 0, 0.1, 1); }

        .list-box { overflow-y: auto; height: 420px; scrollbar-width: none; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .pub-item { padding: 10px; background: #f8fafc; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--blue); font-size: 12px; }

        .pk-card { background: linear-gradient(135deg, #1e293b, #334155); color: #fff; padding: 15px; border-radius: 20px; margin-bottom: 12px; border: 1px solid var(--gold); }
        .pk-vs { display: flex; justify-content: space-between; align-items: center; font-weight: 900; }

        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; box-sizing: border-box; }
        .btn { padding: 12px 20px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        
        #adminModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .admin-box { width: 1000px; background: #fff; border-radius: 30px; padding: 30px; max-height: 90vh; overflow-y: auto; }
        .admin-tabs { display: flex; gap: 10px; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .tab-btn { padding: 10px 20px; border-radius: 12px; background: #f1f5f9; cursor: pointer; }
        .tab-btn.active { background: var(--purp); color: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .admin-sec { background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid #eee; margin-top: 10px; }

        @keyframes flyUp { 0% { transform: translateY(0); } 100% { transform: translateY(-800px); } }
    </style>
</head>
<body>

    <div id="notice-bar"><div class="marquee" id="notice-text">同步十六部作战指令...</div></div>
    <div id="cheer-layer"></div>

    <div id="force-overlay">
        <div style="font-size:100px">🏆</div>
        <div style="font-size:50px; font-weight:900">业绩爆单</div>
        <div id="ov-msg" style="font-size:28px; background:rgba(0,0,0,0.2); padding:10px 40px; border-radius:50px; margin:20px 0"></div>
        <button class="btn" style="background:#fff; color:#000; width:200px" onclick="closeOverlay()">收到！</button>
    </div>

    <div id="pk-invite-overlay">
        <div style="font-size:80px">⚔️</div>
        <div style="font-size:36px; font-weight:900; color:var(--gold);">巅峰挑战书</div>
        <div id="pk-msg" style="font-size:24px; margin:20px 0"></div>
        <div style="display:flex; gap:20px"><button id="pk-acc" class="btn" style="background:var(--green); color:#fff; width:150px">接战</button><button id="pk-rej" class="btn" style="background:var(--red); color:#fff; width:150px">拒绝</button></div>
    </div>

    <div id="auth" class="card" style="width:320px; margin:100px auto; text-align:center">
        <h2 id="auth-title" style="color:var(--blue)">十六部指挥中心</h2>
        <input type="text" id="u" placeholder="代号" style="margin-bottom:10px"><input type="password" id="p" placeholder="密码">
        <button class="btn" style="width:100%; background:var(--blue); color:#fff; margin-top:15px" onclick="handleAuth()">进入系统</button>
        <p style="font-size:12px; color:var(--blue); cursor:pointer; margin-top:15px" onclick="toggleAuthMode()" id="auth-toggle">还没有账号？注册新成员</p>
    </div>

    <div id="app">
        <div class="dashboard">
            <div class="card">
                <div style="display:flex; justify-content:space-between; font-size:12px;"><span>个人: <b id="hiName"></b></span> <span>目标: <b id="myGoalShow">0</b> <a href="javascript:setMyGoal()" style="color:var(--blue)">✏️</a></span></div>
                <div class="prog-box"><div id="myBar" class="bar" style="background:var(--blue)"></div></div>
                <div style="display:flex; gap:8px"><input type="number" id="reportAmt" placeholder="金额"><button class="btn" style="background:var(--green); color:#fff" onclick="reportSale()">上报</button></div>
            </div>
            <div class="card" style="border:2px solid var(--green)">
                <div style="display:flex; justify-content:space-between; font-size:14px"><b>十六部全员总进度</b><b id="totalPct" style="color:var(--green)">0%</b></div>
                <div class="prog-box"><div id="totalBar" class="bar" style="background:var(--green)"></div></div>
                <div id="totalVals" style="font-size:11px; text-align:center; opacity:0.6">正在连接作战网络...</div>
            </div>
            <div class="card" style="text-align:center; display:flex; flex-direction:column; justify-content:center">
                <div id="clock" style="font-size:24px; font-weight:bold; color:var(--blue)">00:00:00</div>
                <div id="adminBtnArea" style="margin-top:5px"></div>
            </div>
        </div>

        <div class="layout">
            <div class="card wheel-area" style="position:relative; display:flex; flex-direction:column; align-items:center">
                <div style="position:absolute; top:15px; font-size:30px; color:var(--red); z-index:10">▼</div>
                <canvas id="wheel"></canvas>
                <div style="margin-top:10px; text-align:center">机会: <b id="cc" style="color:var(--blue); font-size:24px">0</b><br><button class="btn" id="go" style="background:var(--blue); color:#fff; margin-top:10px; width:200px">开启幸运</button></div>
            </div>
            <div class="card"><h4 style="color:var(--gold); margin:0 0 10px 0">🏆 业绩榜单</h4><div id="leaderboard" class="list-box"></div></div>
            <div class="card">
                <h4 style="color:var(--purp); margin:0 0 10px 0">✨ 全员幸运墙</h4>
                <div id="publicRecs" style="height:180px; overflow-y:auto; border-bottom:1px solid #eee; margin-bottom:10px; scrollbar-width:none"></div>
                <h4 style="color:var(--red); margin:0 0 10px 0; font-size:14px">⚔️ 巅峰擂台</h4>
                <div id="pk-list" style="height:180px; overflow-y:auto; scrollbar-width:none"></div>
            </div>
        </div>
    </div>

    <div id="adminModal">
        <div class="admin-box">
            <div class="admin-tabs">
                <div class="tab-btn active" onclick="switchTab('tab-data')">📊 业绩明细</div>
                <div class="tab-btn" onclick="switchTab('tab-sys')">⚙️ 系统公告</div>
                <div class="tab-btn" onclick="switchTab('tab-auth')">🔑 权限擂台</div>
                <button class="btn" style="margin-left:auto; background:#eee" onclick="closeAdmin()">退出</button>
            </div>
            <div id="tab-data" class="tab-content active">
                <div class="admin-sec">🚩 总目标：<input type="number" id="admTotalGoal" style="width:120px"> <button onclick="updateGlobalGoal()" class="btn" style="background:var(--green); color:#fff; padding:5px 15px">保存</button></div>
                <div class="admin-sec"><h4>📝 报单明细 (可删)</h4><table style="width:100%; font-size:12px; text-align:left"><thead><tr><th>时间</th><th>成员</th><th>金额</th><th>操作</th></tr></thead><tbody id="saleLogTable"></tbody></table></div>
                <div class="admin-sec"><h4>👥 成员精修</h4><table style="width:100%; font-size:12px"><tbody id="adminTable"></tbody></table></div>
            </div>
            <div id="tab-sys" class="tab-content">
                <div class="admin-sec"><h4>📢 全员公告</h4><input id="admNotice"><button onclick="updateNotice()" style="width:100%; margin-top:5px; background:var(--red); color:#fff" class="btn">发布</button></div>
                <div class="admin-sec"><h4>🎁 奖品池</h4><input id="admPrizes"><button onclick="updatePrizes()" style="width:100%; margin-top:5px; background:var(--gold)" class="btn">更新</button></div>
            </div>
            <div id="tab-auth" class="tab-content">
                <div class="admin-sec"><h4>🔑 权限分配</h4><table style="width:100%; font-size:12px"><tbody id="authAdminTable"></tbody></table></div>
                <div class="admin-sec"><h4>⚔️ 擂台管理</h4><button onclick="clearAllPKs()" class="btn" style="background:var(--red); color:#fff; width:100%; margin-bottom:10px">清空所有</button><table style="width:100%; font-size:12px"><tbody id="pkAdminTable"></tbody></table></div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://qsrytoirfcouzespqhwm.supabase.co';
        const SB_KEY = 'sb_publishable_sRvIF30CUhyA5bMuEGsgFQ_Cj1Sz6nY';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let me = null, prizes = [], rot = 0, isLoginMode = true;
        const warChannel = sb.channel('war_room', { config: { broadcast: { self: true } } });

        function speak(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang='zh-CN'; window.speechSynthesis.speak(m); }
        function triggerCheer() {
            const layer = document.getElementById('cheer-layer'); const emojis = ['👏','🔥','💰','👍','🏆'];
            for(let i=0; i<15; i++) {
                const el = document.createElement('div'); el.className = 'emoji-fly'; el.innerText = emojis[Math.floor(Math.random()*5)];
                el.style.left = Math.random()*100+'vw'; el.style.animationDelay = Math.random()*0.5+'s';
                layer.appendChild(el); setTimeout(() => el.remove(), 2000);
            }
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-CN',{hour12:false}); }, 1000);

        async function handleAuth() {
            const u = document.getElementById('u').value, p = document.getElementById('p').value;
            if(isLoginMode) {
                const { data } = await sb.from('members').select().eq('username', u).eq('password', p).single();
                if(data) loadApp(data); else alert("身份验证失败");
            } else {
                const { count } = await sb.from('members').select('*', {count:'exact',head:true});
                await sb.from('members').insert([{ username:u, password:p, role:count===0?'admin':'user', current:0, goal:10000, chances:0 }]);
                alert("注册成功！"); toggleAuthMode();
            }
        }

        async function loadApp(data) {
            me = data; document.getElementById('auth').style.display='none'; document.getElementById('app').style.display='flex';
            document.getElementById('hiName').innerText = me.username;
            if(me.role === 'admin') document.getElementById('adminBtnArea').innerHTML = `<button class="btn" style="background:var(--purp); color:#fff; font-size:11px; padding:3px 12px" onclick="openAdmin()">管理中心</button>`;
            
            await refreshData();

            warChannel.on('broadcast', { event: 'force_sale' }, payload => {
                // 关键点修复：payload 必须带 user 和 amount
                const user = payload.payload.user || '作战员';
                const amount = payload.payload.amount || 0;
                showForceOverlay(user, amount);
                if(user !== me.username) speak(`捷报：${user}成交${amount}元！`);
            })
            .on('broadcast', { event: 'force_cheer' }, () => triggerCheer())
            .on('postgres_changes', { event: '*', schema: 'public', table: 'members' }, () => refreshData())
            .on('postgres_changes', { event: '*', schema: 'public', table: 'pk_orders' }, payload => {
                if(payload.eventType === 'INSERT' && payload.new.target === me.username) showPKInvite(payload.new);
                refreshData();
            })
            .on('postgres_changes', { event: '*', schema: 'public', table: 'global_config' }, () => refreshData())
            .subscribe();
        }

        async function reportSale() {
            const aVal = document.getElementById('reportAmt'); const a = parseInt(aVal.value);
            if(!a || a <= 0) return;

            // 发送广播，数据包格式严格对齐
            warChannel.send({ type: 'broadcast', event: 'force_sale', payload: { user: me.username, amount: a } });
            
            await sb.from('sale_logs').insert([{ username: me.username, amount: a }]);
            await sb.from('members').update({ current: (me.current || 0) + a }).eq('username', me.username);
            
            aVal.value = ''; refreshData();
        }

        function showForceOverlay(u, a) {
            const ov = document.getElementById('force-overlay');
            const msg = document.getElementById('ov-msg');
            msg.innerText = `${u} 报单 ${a} 元！`;
            ov.style.display = 'flex';
        }
        function closeOverlay() { document.getElementById('force-overlay').style.display = 'none'; }

        async function refreshData() {
            try {
                const { data: allU } = await sb.from('members').select();
                const { data: conf } = await sb.from('config').select().eq('id', 1).maybeSingle();
                const { data: pks } = await sb.from('pk_orders').select();
                const { data: gConf } = await sb.from('global_config').select().eq('id', 1).maybeSingle();

                if(gConf) {
                    document.getElementById('notice-text').innerText = gConf.notice || '作战开始！';
                    prizes = (gConf.prizes || "").split(','); drawWheel();
                }

                if(allU) {
                    const sorted = allU.sort((a,b)=> (b.current||0) - (a.current||0));
                    document.getElementById('leaderboard').innerHTML = sorted.map((u,i)=>`
                        <div class="rank-item"><span><b>${i+1}.</b> ${u.username} (${u.goal>0?Math.round((u.current/u.goal)*100):0}%)</span>
                        <div><b>¥${u.current.toLocaleString()}</b> <button onclick="sendCheer()" style="border:none;background:none;cursor:pointer">👏</button>
                        <button onclick="startPK('${u.username}')" style="background:none;border:none;cursor:pointer">⚔️</button></div></div>`).join('');
                    
                    const totalCur = allU.reduce((s,u)=>s+(u.current||0), 0);
                    const tGoal = (conf && conf.total_goal > 0) ? conf.total_goal : 100000;
                    document.getElementById('totalPct').innerText = Math.round(totalCur/tGoal*100) + '%';
                    document.getElementById('totalBar').style.width = Math.min(totalCur/tGoal*100, 100) + '%';
                    document.getElementById('totalVals').innerText = `${totalCur.toLocaleString()} / ${tGoal.toLocaleString()}`;

                    let allR = []; allU.forEach(u => (u.records||[]).forEach(r => allR.push({n:u.username, ...r})));
                    allR.sort((a,b)=>new Date(b.t)-new Date(a.t));
                    document.getElementById('publicRecs').innerHTML = allR.slice(0,10).map(r=>`<div class="pub-item"><b>${r.n}</b> 抽得 <b>【${r.p}】</b></div>`).join('');

                    const myU = (allU||[]).find(u=>u.username===me.username);
                    if(myU) { me = myU; document.getElementById('myGoalShow').innerText = me.goal.toLocaleString(); document.getElementById('myBar').style.width = Math.min((me.current/(me.goal||1))*100,100)+'%'; document.getElementById('cc').innerText = me.chances; }
                }
                if(pks) {
                    const active = pks.filter(p => p.status === 'accepted');
                    document.getElementById('pk-list').innerHTML = active.map(pk => {
                        const c = (allU||[]).find(u=>u.username===pk.challenger)||{current:0}, t = (allU||[]).find(u=>u.username===pk.target)||{current:0};
                        return `<div class="pk-card"><div class="pk-vs"><div>${pk.challenger}<br>${c.current}</div><div>VS</div><div>${pk.target}<br>${t.current}</div></div></div>`;
                    }).join('');
                }
            } catch(e){}
        }

        const canvas = document.getElementById('wheel'), ctx = canvas.getContext('2d');
        canvas.width = 600; canvas.height = 600; canvas.style.width = '300px'; canvas.style.height = '300px'; ctx.scale(2,2);
        function drawWheel() {
            if(!prizes.length || prizes==="") return; const arc = (Math.PI*2)/prizes.length; ctx.clearRect(0,0,300,300);
            prizes.forEach((p, i) => {
                ctx.beginPath(); ctx.fillStyle = i%2? "#f1f5f9":"#fff"; ctx.moveTo(150,150); ctx.arc(150,150,145, i*arc, (i+1)*arc); ctx.fill();
                ctx.save(); ctx.translate(150,150); ctx.rotate(i*arc+arc/2);
                ctx.fillStyle = "#1e293b"; ctx.font="bold 10px sans-serif"; ctx.textAlign="right"; ctx.fillText(p, 135, 5); ctx.restore();
            });
        }
        document.getElementById('go').onclick = async () => {
            const {data:myU} = await sb.from('members').select().eq('username', me.username).single();
            if(!myU || myU.chances <= 0) return alert("没机会了");
            document.getElementById('go').disabled = true; const idx = Math.floor(Math.random()*prizes.length);
            rot += (360*10) + (360 - (idx*(360/prizes.length)) - 90 - (180/prizes.length) - (rot%360));
            canvas.style.transform = `rotate(${rot}deg)`;
            setTimeout(async () => {
                const win = prizes[idx]; const newRecs = [{p: win, t: new Date().toLocaleString()}, ...(myU.records||[])];
                await sb.from('members').update({chances: myU.chances-1, records: newRecs.slice(0,20)}).eq('username', me.username);
                alert("中了：" + win); document.getElementById('go').disabled = false; refreshData();
            }, 6000);
        };

        async function openAdmin() {
            document.getElementById('adminModal').style.display='flex';
            const { data: users } = await sb.from('members').select();
            const { data: pks } = await sb.from('pk_orders').select();
            const { data: logs } = await sb.from('sale_logs').select().order('created_at',{ascending:false}).limit(15);
            const { data: gConf } = await sb.from('global_config').select().eq('id',1).single();
            const { data: conf } = await sb.from('config').select().eq('id',1).single();
            document.getElementById('admTotalGoal').value = conf.total_goal;
            document.getElementById('admNotice').value = gConf.notice;
            document.getElementById('admPrizes').value = gConf.prizes;
            document.getElementById('saleLogTable').innerHTML = (logs||[]).map(l => `<tr><td>${new Date(l.created_at).toLocaleTimeString()}</td><td>${l.username}</td><td>${l.amount}</td><td><button onclick="voidSale(${l.id},'${l.username}',${l.amount})" style="color:red">删</button></td></tr>`).join('');
            document.getElementById('adminTable').innerHTML = (users||[]).map(u => `<tr><td>${u.username}</td><td><input id="c-${u.username}" value="${u.current}" style="width:40px">/<input id="g-${u.username}" value="${u.goal}" style="width:60px"></td><td><input id="h-${u.username}" value="${u.chances}" style="width:30px"></td><td><button onclick="saveU('${u.username}')">存</button></td></tr>`).join('');
            document.getElementById('authAdminTable').innerHTML = (users||[]).map(u => `<tr><td><b>${u.username}</b></td><td>${u.role}</td><td><button onclick="changeRole('${u.username}','admin')">管</button><button onclick="changeRole('${u.username}','user')">员</button></td><td><button onclick="safeDeleteMember('${u.username}')" style="color:red">删</button></td></tr>`).join('');
            document.getElementById('pkAdminTable').innerHTML = (pks||[]).map(pk => `<tr><td>${pk.challenger} vs ${pk.target}</td><td>${pk.status}</td><td><button onclick="adminPK(${pk.id},'accepted')">开</button><button onclick="adminPK(${pk.id},'del')">删</button></td></tr>`).join('');
        }

        async function voidSale(id, u, amt) { const { data } = await sb.from('members').select().eq('username', u).single(); await sb.from('members').update({ current: (data.current - amt) }).eq('username', u); await sb.from('sale_logs').delete().eq('id', id); openAdmin(); refreshData(); }
        function switchTab(t){ document.querySelectorAll('.tab-content, .tab-btn').forEach(el=>el.classList.remove('active')); document.getElementById(t).classList.add('active'); event.currentTarget.classList.add('active'); }
        function closeAdmin(){ document.getElementById('adminModal').style.display='none'; }
        function closeOverlay() { document.getElementById('force-overlay').style.display = 'none'; }
        async function setMyGoal() { const g=prompt("新目标?",me.goal); if(g) { await sb.from('members').update({goal:parseInt(g)}).eq('username',me.username); refreshData(); } }
        function toggleAuthMode() { isLoginMode=!isLoginMode; document.getElementById('auth-title').innerText=isLoginMode?"十六部指挥中心":"新成员注册"; }
        async function startPK(t) { if(t===me.username) return; const a=prompt("挑战金额?","5000"); if(a) await sb.from('pk_orders').insert([{challenger:me.username, target:t, amount:parseInt(a)}]); }
        function showPKInvite(pk) { document.getElementById('pk-msg').innerText = `${pk.challenger} 向你挑战！`; document.getElementById('pk-invite-overlay').style.display='flex'; 
            document.getElementById('pk-acc').onclick = async () => { await sb.from('pk_orders').update({status:'accepted'}).eq('id',pk.id); document.getElementById('pk-invite-overlay').style.display='none'; };
            document.getElementById('pk-rej').onclick = async () => { await sb.from('pk_orders').update({status:'rejected'}).eq('id',pk.id); document.getElementById('pk-invite-overlay').style.display='none'; };
        }
        function sendCheer() { warChannel.send({ type: 'broadcast', event: 'force_cheer', payload: {} }); triggerCheer(); }
        async function saveU(u){ const c=document.getElementById(`c-${u}`).value, g=document.getElementById(`g-${u}`).value, h=document.getElementById(`h-${u}`).value; await sb.from('members').update({current:parseInt(c),goal:parseInt(g),chances:parseInt(h)}).eq('username',u); refreshData(); }
        async function changeRole(u,r){ await sb.from('members').update({role:r}).eq('username',u); openAdmin(); }
        async function safeDeleteMember(u){ if(confirm("移除?")){ await sb.from('pk_orders').delete().or(`challenger.eq.${u},target.eq.${u}`); await sb.from('members').delete().eq('username',u); openAdmin(); refreshData(); } }
        async function adminPK(id,act){ if(act==='del')await sb.from('pk_orders').delete().eq('id',id); else await sb.from('pk_orders').update({status:act}).eq('id',id); openAdmin(); refreshData(); }
        async function clearAllPKs(){ if(confirm("重置全场?")){ await sb.from('pk_orders').delete().neq('id',0); openAdmin(); refreshData(); } }
        async function updateNotice(){ await sb.from('global_config').update({notice:document.getElementById('admNotice').value}).eq('id',1); }
        async function updatePrizes(){ await sb.from('global_config').update({prizes:document.getElementById('admPrizes').value}).eq('id',1); refreshData(); }
        async function updateGlobalGoal(){ await sb.from('config').update({total_goal:parseInt(document.getElementById('admTotalGoal').value)}).eq('id',1); refreshData(); }
    </script>
</body>
</html>
